name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .
      # Kingdee SDK is a vendored wheel (not on PyPI); src/kingdee/client.py imports it
      # at module top, so the whole suite fails to collect without this install.
      - run: pip install sdk/python_sdk_v8.2.0/*.whl
      - run: pip install pytest pytest-asyncio pytest-cov pytest-timeout
      - run: pytest tests/ --ignore=tests/e2e --ignore=tests/integration -q --timeout=60

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check src/
      # Fail if any responsive Tailwind class used in markup is absent from both
      # the precompiled bundle and main.css (the silent-hide gap, e.g. md:inline).
      - run: bash scripts/check_tailwind_classes.sh

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .
      - run: pip install sdk/python_sdk_v8.2.0/*.whl
      - run: pip install mypy
      - run: mypy src/ --ignore-missing-imports
